<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Animali</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body class="bg-secondary">
    <main>
      <section>
        <div class="container">
          <div class="row justify-content-center mt-5">
            <div class="col-12 col-md-6">
              <h2 class="text-uppercase text-center">Form Animali</h2>
              <form id="form-animal" class="d-flex flex-column gap-lg-4">
                <div class="nome-con">
                  <label for="nome-input" class="form-label">Nome del tuo animale</label>
                  <input type="text" class="form-control" id="nome-input" placeholder="Fido" />
                </div>
                <div class="owner-con">
                  <label for="owner-input" class="form-label">Il tuo nome</label>
                  <input type="text" class="form-control" id="owner-input" placeholder="Mario" />
                </div>
                <div class="specie-con">
                  <label for="specie-input" class="form-label">Specie</label>
                  <input type="text" class="form-control" id="specie-input" placeholder="Cane" />
                </div>
                <div class="razza-con">
                  <label for="razza-input" class="form-label">Razza</label>
                  <input type="text" class="form-control" id="razza-input" placeholder="Labrador" />
                </div>
                <div id="buttonSubmit" class="mt-3">
                  <button class="btn btn-info w-25" type="submit">Invia</button>
                </div>
              </form>
              <div class="container p-0">
                <div id="rubrica" class="row-cols-1 d-flex flex-column"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./script.js"></script>
  </body>
</html>
