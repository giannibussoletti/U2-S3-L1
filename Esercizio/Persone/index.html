<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Persone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body class="bg-secondary">
    <main>
      <section>
        <div class="container">
          <div class="row justify-content-center mt-5">
            <div class="col-12 col-md-6">
              <h2 class="text-uppercase text-center">Form Età</h2>
              <form id="form-age" class="d-flex flex-column gap-lg-4">
                <div class="nome-con">
                  <label for="nome-input" class="form-label">Nome</label>
                  <input type="text" class="form-control" id="nome-input" placeholder="Mario" />
                </div>
                <div class="cognome-con">
                  <label for="cognome-input" class="form-label">Cognome</label>
                  <input type="text" class="form-control" id="cognome-input" placeholder="Rossi" />
                </div>
                <div class="age-con">
                  <label for="age-input" class="form-label">Età</label>
                  <input type="number" class="form-control" id="age-input" placeholder="99" />
                </div>
                <div class="location-con">
                  <label for="location-input" class="form-label">Città</label>
                  <input
                    type="text"
                    class="form-control"
                    id="location-input"
                    placeholder="Roma..." />
                </div>
                <div id="buttonSubmit" class="mt-3">
                  <button class="btn btn-info w-25" type="submit">Invia</button>
                </div>
              </form>
              <div class="container p-0">
                <div id="rubrica" class="row-cols-1 d-flex flex-column"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
